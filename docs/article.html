<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Open Source Radar | 文章详情</title>
    <meta name="description" content="AI Open Source Radar 单篇详情页，查看 AI 开源项目 Top 3 的中文解读、同类对比、上手教程、商用建议和风险提示。">
    <style>
      :root {
        --bg: #f6f3eb;
        --panel: rgba(255, 251, 244, 0.94);
        --ink: #1f2320;
        --muted: #5f665f;
        --line: rgba(31, 35, 32, 0.12);
        --brand: #0d7a5f;
        --brand-2: #ca5d2a;
        --shadow: 0 24px 60px rgba(31, 35, 32, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Source Han Sans SC", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(202, 93, 42, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(13, 122, 95, 0.16), transparent 30%),
          linear-gradient(180deg, #f9f5ee 0%, var(--bg) 100%);
      }

      a { color: inherit; }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 20px 64px;
      }

      .hero,
      .article,
      .footer {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero,
      .footer {
        padding: 28px;
      }

      .article {
        margin-top: 20px;
        padding: 34px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(13, 122, 95, 0.1);
        color: var(--brand);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 1.08;
      }

      .meta,
      .lead,
      .muted {
        color: var(--muted);
        line-height: 1.8;
      }

      .lead { margin-top: 16px; font-size: 18px; }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 700;
      }

      .button.primary { background: var(--ink); color: #fff; }
      .button.secondary { border: 1px solid var(--line); background: rgba(255,255,255,0.6); }

      .article-content h1,
      .article-content h2,
      .article-content h3,
      .article-content h4 {
        margin: 32px 0 14px;
        line-height: 1.3;
      }

      .article-content h1 { font-size: 34px; }
      .article-content h2 { font-size: 28px; }
      .article-content h3 { font-size: 22px; }
      .article-content h4 { font-size: 18px; }

      .article-content p,
      .article-content li {
        line-height: 1.9;
        font-size: 17px;
      }

      .article-content ul,
      .article-content ol {
        padding-left: 22px;
      }

      .article-content hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 28px 0;
      }

      .article-content code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(31, 35, 32, 0.06);
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 0.92em;
      }

      .article-content pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 18px;
        background: #171a18;
        color: #f7f3eb;
      }

      .article-content pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      .article-content blockquote {
        margin: 20px 0;
        padding: 2px 0 2px 18px;
        border-left: 4px solid rgba(13, 122, 95, 0.35);
        color: var(--muted);
      }

      .footer {
        margin-top: 20px;
        background: linear-gradient(135deg, rgba(13, 122, 95, 0.08), rgba(202, 93, 42, 0.08));
      }

      .loading {
        opacity: 0.72;
      }

      @media (max-width: 720px) {
        .hero,
        .article,
        .footer { padding: 22px; }
        .article-content p,
        .article-content li { font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero loading" id="hero">
        <div class="eyebrow">AI Open Source Radar</div>
        <p class="meta" id="article-date">加载中...</p>
        <h1 id="article-title">正在加载文章详情</h1>
        <p class="lead" id="article-summary">请稍候，正在读取最新归档内容。</p>
        <div class="actions">
          <a class="button secondary" href="./">返回首页</a>
          <a class="button secondary" href="content/top3/README.md">查看归档</a>
          <a class="button primary" id="raw-link" href="#">查看原文</a>
          <a class="button secondary" id="github-link" href="#" target="_blank" rel="noreferrer">GitHub 文件</a>
        </div>
      </section>

      <article class="article loading">
        <div class="article-content" id="article-content">
          <p class="muted">正在加载正文...</p>
        </div>
      </article>

      <section class="footer">
        <p class="muted">
          如果你也在关注 AI、Agent 和最新开源趋势，欢迎关注我的微信公众号：碳基生物观察局。
        </p>
      </section>
    </main>
    <script>
      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function renderInline(text) {
        const escaped = escapeHtml(text);
        return escaped
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
          .replace(/\*([^*]+)\*/g, '<em>$1</em>')
          .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      }

      function markdownToHtml(markdown) {
        const lines = markdown.replace(/\r/g, '').split('\n');
        const html = [];
        let inList = false;
        let listType = '';
        let inCode = false;
        let codeLines = [];
        let paragraph = [];

        function flushParagraph() {
          if (!paragraph.length) return;
          html.push('<p>' + renderInline(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }

        function flushList() {
          if (!inList) return;
          html.push('</' + listType + '>');
          inList = false;
          listType = '';
        }

        function flushCode() {
          if (!inCode) return;
          html.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
          inCode = false;
          codeLines = [];
        }

        for (const rawLine of lines) {
          const line = rawLine;

          if (line.startsWith('```')) {
            flushParagraph();
            flushList();
            if (inCode) {
              flushCode();
            } else {
              inCode = true;
              codeLines = [];
            }
            continue;
          }

          if (inCode) {
            codeLines.push(line);
            continue;
          }

          if (!line.trim()) {
            flushParagraph();
            flushList();
            continue;
          }

          const heading = line.match(/^(#{1,4})\s+(.*)$/);
          if (heading) {
            flushParagraph();
            flushList();
            const level = heading[1].length;
            html.push('<h' + level + '>' + renderInline(heading[2]) + '</h' + level + '>');
            continue;
          }

          if (/^---+$/.test(line.trim())) {
            flushParagraph();
            flushList();
            html.push('<hr>');
            continue;
          }

          const ul = line.match(/^[-*]\s+(.*)$/);
          if (ul) {
            flushParagraph();
            if (!inList || listType !== 'ul') {
              flushList();
              html.push('<ul>');
              inList = true;
              listType = 'ul';
            }
            html.push('<li>' + renderInline(ul[1]) + '</li>');
            continue;
          }

          const ol = line.match(/^\d+\.\s+(.*)$/);
          if (ol) {
            flushParagraph();
            if (!inList || listType !== 'ol') {
              flushList();
              html.push('<ol>');
              inList = true;
              listType = 'ol';
            }
            html.push('<li>' + renderInline(ol[1]) + '</li>');
            continue;
          }

          const quote = line.match(/^>\s?(.*)$/);
          if (quote) {
            flushParagraph();
            flushList();
            html.push('<blockquote><p>' + renderInline(quote[1]) + '</p></blockquote>');
            continue;
          }

          paragraph.push(line.trim());
        }

        flushParagraph();
        flushList();
        flushCode();
        return html.join('\n');
      }

      async function loadArticle() {
        try {
          const params = new URLSearchParams(window.location.search);
          const slug = params.get('slug');
          const indexResponse = await fetch('content/top3/index.json', { cache: 'no-store' });
          if (!indexResponse.ok) throw new Error('Failed to load index');
          const data = await indexResponse.json();
          const entries = Array.isArray(data.entries) ? data.entries : [];
          const entry = entries.find((item) => item.slug === slug) || entries[0];
          if (!entry) throw new Error('No article found');

          const articlePath = entry.wechat_path;
          const articleResponse = await fetch(articlePath, { cache: 'no-store' });
          if (!articleResponse.ok) throw new Error('Failed to load article');
          const markdown = await articleResponse.text();

          const names = (entry.projects || []).map((project) => project.name).filter(Boolean);
          document.title = entry.title + ' | AI Open Source Radar';
          document.getElementById('article-date').textContent = '发布于 ' + entry.date;
          document.getElementById('article-title').textContent = entry.title;
          document.getElementById('article-summary').textContent = names.length
            ? '入选项目：' + names.join(' / ')
            : '今日 AI 开源项目精选详情页';
          document.getElementById('raw-link').href = articlePath;
          document.getElementById('github-link').href = 'https://github.com/jxcwp/hot-ai-repo/blob/main/' + articlePath;
          document.getElementById('article-content').innerHTML = markdownToHtml(markdown);
          document.getElementById('hero').classList.remove('loading');
          document.querySelector('.article').classList.remove('loading');
        } catch (error) {
          console.error(error);
          document.getElementById('article-title').textContent = '文章加载失败';
          document.getElementById('article-summary').textContent = '请返回首页或稍后重试。';
          document.getElementById('article-content').innerHTML = '<p class="muted">当前文章详情暂时不可用，请先返回首页查看最新归档。</p>';
          document.getElementById('hero').classList.remove('loading');
          document.querySelector('.article').classList.remove('loading');
        }
      }

      loadArticle();
    </script>
  </body>
</html>
